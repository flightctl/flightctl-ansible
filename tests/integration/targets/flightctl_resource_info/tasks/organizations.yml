---
- name: Test Get Organization Info (list-only)
  vars:
    connection_info: &connection_info
      flightctl_token: "{{ flightctl_token | default(omit)}}"
      flightctl_host: "{{ flightctl_host }}"
      flightctl_organization: "{{ flightctl_organization | default(omit)}}"
      flightctl_validate_certs: False
  block:
    - name: List all organizations
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: Organization
      register: orgs_result

    - name: Assert that organizations were listed successfully
      ansible.builtin.assert:
        that:
          - orgs_result is success
          - orgs_result.result.data is defined
