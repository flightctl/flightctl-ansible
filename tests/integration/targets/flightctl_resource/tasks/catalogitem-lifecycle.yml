---
- name: Test CatalogItem lifecycle (create, update, get, list, delete)
  vars:
    catalog_name: ansible-integration-test-catalogitem-parent
    item_name: test-app
    connection_info: &connection_info
      flightctl_token: "{{ flightctl_token | default(omit) }}"
      flightctl_host: "{{ flightctl_host }}"
      flightctl_organization: "{{ flightctl_organization | default(omit) }}"
      flightctl_validate_certs: False
  block:
    - name: Create parent catalog
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
        resource_definition:
          spec:
            displayName: CatalogItem Test Parent
            provider: Ansible Integration Tests

    - name: Create a catalog item
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: CatalogItem
        catalog_name: "{{ catalog_name }}"
        name: "{{ item_name }}"
        resource_definition:
          spec:
            type: container
            displayName: Test Application
            shortDescription: A test container application
            artifacts:
              - type: container
                uri: quay.io/myorg/myapp
            versions:
              - version: "1.0.0"
                references:
                  container: "1.0.0"
                channels:
                  - stable
      register: create_result

    - name: Assert catalog item was created
      ansible.builtin.assert:
        that:
          - create_result is success
          - create_result.changed | default(true) | bool

    - name: Get catalog item
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: CatalogItem
        catalog_name: "{{ catalog_name }}"
        name: "{{ item_name }}"
      register: get_result

    - name: Assert catalog item was fetched
      ansible.builtin.assert:
        that:
          - get_result is success
          - get_result.result.data | length == 1
          - get_result.result.data[0].metadata.name == item_name
          - get_result.result.data[0].spec.displayName == "Test Application"
          - get_result.result.data[0].spec.type == "container"

    - name: List catalog items in the catalog
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: CatalogItem
        catalog_name: "{{ catalog_name }}"
      register: list_result

    - name: Assert catalog items were listed
      ansible.builtin.assert:
        that:
          - list_result is success
          - list_result.result.data is defined
          - list_result.result.data | length >= 1

    - name: Update catalog item (change display name)
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: CatalogItem
        catalog_name: "{{ catalog_name }}"
        name: "{{ item_name }}"
        resource_definition:
          spec:
            type: container
            displayName: Updated Test Application
            shortDescription: An updated test container application
            artifacts:
              - type: container
                uri: quay.io/myorg/myapp
            versions:
              - version: "1.0.0"
                references:
                  container: "1.0.0"
                channels:
                  - stable
      register: update_result

    - name: Assert update reported change
      ansible.builtin.assert:
        that:
          - update_result is success
          - update_result.changed | default(false) | bool

    - name: Get catalog item after update
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: CatalogItem
        catalog_name: "{{ catalog_name }}"
        name: "{{ item_name }}"
      register: get_after

    - name: Assert catalog item was updated
      ansible.builtin.assert:
        that:
          - get_after is success
          - get_after.result.data[0].spec.displayName == "Updated Test Application"

    - name: Delete catalog item
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: CatalogItem
        catalog_name: "{{ catalog_name }}"
        name: "{{ item_name }}"
        state: absent
      register: delete_result

    - name: Assert catalog item was deleted
      ansible.builtin.assert:
        that:
          - delete_result is success
          - delete_result.changed | default(true) | bool

    - name: Delete catalog item again (idempotent)
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: CatalogItem
        catalog_name: "{{ catalog_name }}"
        name: "{{ item_name }}"
        state: absent
      register: delete_again

    - name: Assert no change on second delete
      ansible.builtin.assert:
        that:
          - delete_again is success
          - not delete_again.changed

  always:
    - name: Cleanup - delete catalog item
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: CatalogItem
        catalog_name: "{{ catalog_name }}"
        name: "{{ item_name }}"
        state: absent
      ignore_errors: true

    - name: Cleanup - delete parent catalog
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
        state: absent
      ignore_errors: true
