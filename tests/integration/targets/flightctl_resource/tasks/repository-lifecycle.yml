---
- name: Test Repository lifecycle (create, update, get, delete)
  vars:
    repository_name: ansible-integration-test-repository-lifecycle
    connection_info: &connection_info
      flightctl_token: "{{ flightctl_token | default(omit)}}"
      flightctl_host: "{{ flightctl_host }}"
      flightctl_organization: "{{ flightctl_organization | default(omit)}}"
      flightctl_validate_certs: False
  block:
    - name: Create a test repository
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Repository
        name: "{{ repository_name }}"
        resource_definition:
          spec:
            url: https://github.com/flightctl/flightctl.git
            type: git
      register: create_result

    - name: Assert repository was created
      ansible.builtin.assert:
        that:
          - create_result is success
          - create_result.changed | default(true) | bool

    - name: Get repository
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: Repository
        name: "{{ repository_name }}"
      register: get_result

    - name: Assert repository was fetched
      ansible.builtin.assert:
        that:
          - get_result is success
          - get_result.result.data[0].spec.url == "https://github.com/flightctl/flightctl.git"
          - get_result.result.data[0].spec.type == "git"

    - name: Update repository (switch URL to flightctl-ansible repo)
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Repository
        name: "{{ repository_name }}"
        resource_definition:
          spec:
            url: https://github.com/flightctl/flightctl-ansible.git
            type: git
      register: update_result

    - name: Assert update reported change
      ansible.builtin.assert:
        that:
          - update_result is success
          - update_result.changed | default(false) | bool

    - name: Get repository after update
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: Repository
        name: "{{ repository_name }}"
      register: get_after

    - name: Assert repository was updated
      ansible.builtin.assert:
        that:
          - get_after is success
          - get_after.result.data[0].metadata.name == "{{ repository_name }}"
          - get_after.result.data[0].spec.url == "https://github.com/flightctl/flightctl-ansible.git"

  always:
    - name: Delete test repository
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Repository
        name: "{{ repository_name }}"
        state: absent
