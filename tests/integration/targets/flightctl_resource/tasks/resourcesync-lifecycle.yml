---
- name: Test ResourceSync lifecycle (create, update, get, delete)
  vars:
    repository_name: ansible-integration-test-repo-sync-lifecycle
    resource_sync_name: ansible-integration-test-resource-sync-lifecycle
    connection_info: &connection_info
      flightctl_token: "{{ flightctl_token | default(omit)}}"
      flightctl_host: "{{ flightctl_host }}"
      flightctl_organization: "{{ flightctl_organization | default(omit)}}"
      flightctl_validate_certs: False
  block:
    - name: Create a test repository for ResourceSync
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Repository
        name: "{{ repository_name }}"
        resource_definition:
          spec:
            url: https://github.com/flightctl/flightctl.git
            type: git
      register: repo_create_result

    - name: Assert repository was created
      ansible.builtin.assert:
        that:
          - repo_create_result is success

    - name: Create a test resource sync
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: ResourceSync
        name: "{{ resource_sync_name }}"
        resource_definition:
          spec:
            repository: "{{ repository_name }}"
            path: /examples/fleet.yaml
            targetRevision: main
      register: create_result

    - name: Assert resource sync was created
      ansible.builtin.assert:
        that:
          - create_result is success
          - create_result.changed | default(true) | bool

    - name: Get resource sync
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: ResourceSync
        name: "{{ resource_sync_name }}"
      register: get_result

    - name: Assert resource sync was fetched
      ansible.builtin.assert:
        that:
          - get_result is success
          - get_result.result.data[0].spec.repository == "{{ repository_name }}"
          - get_result.result.data[0].spec.targetRevision == "main"
          - get_result.result.data[0].spec.path == "/examples/fleet.yaml"

    - name: Update resource sync (change path)
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: ResourceSync
        name: "{{ resource_sync_name }}"
        resource_definition:
          spec:
            repository: "{{ repository_name }}"
            path: /README.md
            targetRevision: main
      register: update_result

    - name: Assert update reported change
      ansible.builtin.assert:
        that:
          - update_result is success

    - name: Get resource sync after update
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: ResourceSync
        name: "{{ resource_sync_name }}"
      register: get_after

    - name: Assert resource sync was updated
      ansible.builtin.assert:
        that:
          - get_after is success
          - get_after.result.data[0].metadata.name == "{{ resource_sync_name }}"
          - get_after.result.data[0].spec.path == "/README.md"

  always:
    - name: Delete test resource sync
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: ResourceSync
        name: "{{ resource_sync_name }}"
        state: absent

    - name: Delete test repository
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Repository
        name: "{{ repository_name }}"
        state: absent
