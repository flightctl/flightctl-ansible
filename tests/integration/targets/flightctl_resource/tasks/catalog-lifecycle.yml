---
- name: Test Catalog lifecycle (create, update, get, delete)
  vars:
    catalog_name: ansible-integration-test-catalog-lifecycle
    connection_info: &connection_info
      flightctl_token: "{{ flightctl_token | default(omit) }}"
      flightctl_host: "{{ flightctl_host }}"
      flightctl_organization: "{{ flightctl_organization | default(omit) }}"
      flightctl_validate_certs: False
  block:
    - name: Create a test catalog
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
        resource_definition:
          spec:
            displayName: Integration Test Catalog
            shortDescription: A catalog for integration testing
            provider: Ansible Integration Tests
      register: create_result

    - name: Assert catalog was created
      ansible.builtin.assert:
        that:
          - create_result is success
          - create_result.changed | default(true) | bool

    - name: Get catalog
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
      register: get_result

    - name: Assert catalog was fetched
      ansible.builtin.assert:
        that:
          - get_result is success
          - get_result.result.data | length == 1
          - get_result.result.data[0].metadata.name == catalog_name
          - get_result.result.data[0].spec.displayName == "Integration Test Catalog"
          - get_result.result.data[0].spec.provider == "Ansible Integration Tests"

    - name: Update catalog (change display name and description)
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
        resource_definition:
          spec:
            displayName: Updated Test Catalog
            shortDescription: Updated description for integration testing
            provider: Ansible Integration Tests
      register: update_result

    - name: Assert update reported change
      ansible.builtin.assert:
        that:
          - update_result is success
          - update_result.changed | default(false) | bool

    - name: Get catalog after update
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
      register: get_after

    - name: Assert catalog was updated
      ansible.builtin.assert:
        that:
          - get_after is success
          - get_after.result.data[0].metadata.name == catalog_name
          - get_after.result.data[0].spec.displayName == "Updated Test Catalog"
          - get_after.result.data[0].spec.shortDescription == "Updated description for integration testing"

    - name: List all catalogs
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: Catalog
      register: list_result

    - name: Assert catalogs were listed successfully
      ansible.builtin.assert:
        that:
          - list_result is success
          - list_result.result.data is defined
          - list_result.result.data | length >= 1

    - name: Delete the test catalog
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
        state: absent
      register: delete_result

    - name: Assert catalog was deleted
      ansible.builtin.assert:
        that:
          - delete_result is success
          - delete_result.changed | default(true) | bool

    - name: Delete again (idempotent)
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
        state: absent
      register: delete_again

    - name: Assert no change on second delete
      ansible.builtin.assert:
        that:
          - delete_again is success
          - not delete_again.changed

  always:
    - name: Cleanup - ensure test catalog is deleted
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Catalog
        name: "{{ catalog_name }}"
        state: absent
