---
- name: Test Fleet lifecycle (create, update, idempotency, delete)
  vars:
    fleet_name: ansible-integration-test-fleet-lifecycle
    connection_info: &connection_info
      flightctl_token: "{{ flightctl_token | default(omit)}}"
      flightctl_host: "{{ flightctl_host }}"
      flightctl_organization: "{{ flightctl_organization | default(omit)}}"
      flightctl_validate_certs: False
  block:
    - name: Create a test fleet
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Fleet
        name: "{{ fleet_name }}"
        resource_definition:
          spec:
            selector:
              matchLabels:
                fleet: "{{ fleet_name }}"
            template:
              spec:
                os:
                  image: quay.io/redhat/rhde:9.2
      register: create_result

    - name: Assert fleet was created
      ansible.builtin.assert:
        that:
          - create_result is success
          - create_result.changed | default(true) | bool

    - name: Get fleet via flightctl_resource_info
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: Fleet
        name: "{{ fleet_name }}"
      register: get_result

    - name: Assert fleet was fetched
      ansible.builtin.assert:
        that:
          - get_result is success
          - get_result.result.data[0].spec.template.spec.os.image == "quay.io/redhat/rhde:9.2"

    - name: Patch fleet (change template image)
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Fleet
        name: "{{ fleet_name }}"
        resource_definition:
          spec:
            selector:
              matchLabels:
                fleet: "{{ fleet_name }}"
            template:
              spec:
                os:
                  image: quay.io/redhat/rhde:9.3
      register: patch_result

    - name: Assert patch reported change
      ansible.builtin.assert:
        that:
          - patch_result is success
          - patch_result.changed | default(true) | bool

    - name: Run same patch again (idempotency)
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Fleet
        name: "{{ fleet_name }}"
        resource_definition:
          spec:
            selector:
              matchLabels:
                fleet: "{{ fleet_name }}"
            template:
              spec:
                os:
                  image: quay.io/redhat/rhde:9.3
      register: idempotent_result

    - name: Assert second run did not report change
      ansible.builtin.assert:
        that:
          - idempotent_result is success
          - not (idempotent_result.changed | default(false) | bool)

    - name: Get fleet after patch
      flightctl.core.flightctl_resource_info:
        <<: *connection_info
        kind: Fleet
        name: "{{ fleet_name }}"
      register: get_after

    - name: Assert fleet spec was updated
      ansible.builtin.assert:
        that:
          - get_after.result.data[0].spec.template.spec.os.image == "quay.io/redhat/rhde:9.3"

  always:
    - name: Delete test fleet
      flightctl.core.flightctl_resource:
        <<: *connection_info
        kind: Fleet
        name: "{{ fleet_name }}"
        state: absent
